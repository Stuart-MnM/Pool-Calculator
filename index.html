<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#03045e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Pool Fill">
<title>Pool Fill Calculator</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=DM+Mono:wght@500&display=swap');

  :root {
    --navy:  #03045e;
    --blue:  #0096c7;
    --aqua:  #48cae4;
    --tile:  #e0f4fb;
    --sand:  #fdf6ec;
    --muted: #5a7f90;
    --white: #ffffff;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', -apple-system, sans-serif;
    min-height: 100vh;
    background: var(--sand);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 24px 16px 40px;
  }

  .header { text-align: center; margin-bottom: 20px; }
  .header h1 {
    font-size: 13px; font-weight: 700;
    letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted);
  }
  .header p {
    font-size: 28px; font-weight: 700; color: var(--navy);
    margin-top: 2px; letter-spacing: -0.5px;
  }

  .card {
    background: var(--white);
    border-radius: 24px;
    width: 100%; max-width: 380px;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(3,4,94,.13), 0 4px 12px rgba(3,4,94,.07);
  }

  /* Pool visualiser */
  .pool-wrap { background: var(--tile); padding: 20px 24px 16px; }
  .pool-label {
    font-size: 11px; font-weight: 700; letter-spacing: 0.1em;
    text-transform: uppercase; color: var(--muted);
    margin-bottom: 10px;
    display: flex; justify-content: space-between; align-items: center;
  }
  .pool-label span { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--blue); }
  .pool-svg-wrap { display: flex; justify-content: center; }
  #poolSvg { display: block; overflow: visible; }

  /* Toggle */
  .toggle-wrap {
    padding: 16px 24px 0;
    display: flex; gap: 8px;
  }
  .toggle-btn {
    flex: 1; padding: 10px 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px; font-weight: 600;
    border-radius: 10px; border: 2px solid #d7e8f0;
    background: var(--sand); color: var(--muted);
    cursor: pointer; transition: all .18s;
    -webkit-appearance: none; appearance: none; outline: none;
  }
  .toggle-btn.active {
    background: var(--navy); color: var(--white);
    border-color: var(--navy);
  }

  /* Controls */
  .controls { padding: 16px 24px 24px; display: flex; flex-direction: column; gap: 14px; }
  .row { display: flex; gap: 12px; }
  .field { flex: 1; display: flex; flex-direction: column; gap: 5px; }
  .field.full { flex: unset; width: 100%; }

  label {
    font-size: 11px; font-weight: 700;
    letter-spacing: 0.09em; text-transform: uppercase; color: var(--muted);
  }

  input {
    font-family: 'DM Sans', sans-serif;
    font-size: 18px; font-weight: 500;
    color: var(--navy); background: var(--sand);
    border: 2px solid transparent; border-radius: 12px;
    padding: 11px 14px; width: 100%; outline: none;
    -webkit-appearance: none; appearance: none;
  }
  input:focus { border-color: var(--aqua); background-color: #f0fafd; }
  input::placeholder { color: #b0c8d4; }

  .hint { font-size: 11px; color: var(--muted); margin-top: 2px; }

  /* Depth rows */
  #depthFlat, #depthSloped { display: flex; flex-direction: column; gap: 14px; }

  /* Result */
  .result-wrap {
    background: linear-gradient(135deg, var(--navy) 0%, #0077b6 100%);
    margin: 0 24px 24px; border-radius: 16px; padding: 18px 20px;
    display: flex; align-items: center; justify-content: space-between; gap: 10px;
  }
  .result-main { display: flex; flex-direction: column; }
  .result-num {
    font-family: 'DM Mono', monospace;
    font-size: 34px; font-weight: 500; color: var(--white);
    line-height: 1; letter-spacing: -1px;
  }
  .result-unit {
    font-size: 12px; font-weight: 700; letter-spacing: 0.1em;
    text-transform: uppercase; color: var(--aqua); margin-top: 4px;
  }
  .result-sub {
    font-family: 'DM Mono', monospace; font-size: 15px;
    color: rgba(255,255,255,0.5); text-align: right; white-space: nowrap;
  }
  .result-sub span {
    display: block; font-size: 11px; text-transform: uppercase;
    letter-spacing: 0.08em; color: rgba(255,255,255,0.35); margin-bottom: 2px;
  }
</style>
</head>
<body>

<div class="header">
  <h1>Pool Fill Calculator</h1>
  <p>How much water do you need?</p>
</div>

<div class="card">

  <!-- SVG diagram -->
  <div class="pool-wrap">
    <div class="pool-label">
      <span id="viewLabel">Top-down view</span>
      <span id="dimLabel">5m × 9m</span>
    </div>
    <div class="pool-svg-wrap">
      <svg id="poolSvg" width="280" height="140" viewBox="0 0 280 140">
        <defs>
          <linearGradient id="waterGrad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#48cae4"/>
            <stop offset="100%" stop-color="#0096c7"/>
          </linearGradient>
          <linearGradient id="tileGrad" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#caf0f8"/>
            <stop offset="100%" stop-color="#ade8f4"/>
          </linearGradient>
          <pattern id="tiles" x="0" y="0" width="14" height="14" patternUnits="userSpaceOnUse">
            <rect width="14" height="14" fill="url(#tileGrad)"/>
            <rect width="13" height="13" fill="none" stroke="white" stroke-width="0.8" opacity="0.6"/>
          </pattern>
          <marker id="arr" markerWidth="6" markerHeight="6" refX="3" refY="3" orient="auto">
            <path d="M6,3 L0,0 L0,6 Z" fill="#0096c7"/>
          </marker>
          <marker id="arr2" markerWidth="6" markerHeight="6" refX="3" refY="3" orient="auto-start-reverse">
            <path d="M0,3 L6,0 L6,6 Z" fill="#0096c7"/>
          </marker>
        </defs>

        <!-- TOP-DOWN VIEW (flat mode) -->
        <g id="svgTopDown">
          <rect id="tdOuter" x="2" y="2" width="244" height="124" rx="10" fill="#b8dce8"/>
          <rect id="tdInner" x="12" y="12" width="224" height="104" rx="6" fill="url(#tiles)"/>
          <rect id="tdWater" x="12" y="12" width="224" height="104" rx="6" fill="url(#waterGrad)" opacity="0.82"/>
          <line id="tdLane1" x1="12" y1="47" x2="236" y2="47" stroke="white" stroke-width="1.2" stroke-dasharray="8 5" opacity="0.45"/>
          <line id="tdLane2" x1="12" y1="81" x2="236" y2="81" stroke="white" stroke-width="1.2" stroke-dasharray="8 5" opacity="0.45"/>
          <!-- dimension lines -->
          <line id="tdDimH" x1="12" y1="132" x2="236" y2="132" stroke="#0096c7" stroke-width="1.5" marker-start="url(#arr)" marker-end="url(#arr2)"/>
          <text id="tdWLbl" x="124" y="129" text-anchor="middle" fill="#03045e" font-size="10" font-family="DM Mono,monospace" font-weight="500">9 m</text>
          <line id="tdDimV" x1="248" y1="12" x2="248" y2="116" stroke="#0096c7" stroke-width="1.5" marker-start="url(#arr)" marker-end="url(#arr2)"/>
          <text id="tdHLbl" x="252" y="68" fill="#03045e" font-size="10" font-family="DM Mono,monospace" font-weight="500" writing-mode="tb">5 m</text>
        </g>

        <!-- SIDE / CROSS-SECTION VIEW (sloped mode) -->
        <g id="svgSide" style="display:none">
          <!-- pool shell (trapezoid) -->
          <polygon id="sideShell" points="10,10 250,10 250,120 10,120" fill="#b8dce8" stroke="none"/>
          <!-- water fill (sloped) -->
          <polygon id="sideWater" points="10,10 250,10 250,120 10,120" fill="url(#waterGrad)" opacity="0.85"/>
          <!-- pool floor line -->
          <line id="sideFloor" x1="10" y1="120" x2="250" y2="120" stroke="#7ab8cc" stroke-width="2"/>
          <!-- shallow depth arrow -->
          <line id="sideArrowS" x1="30" y1="10" x2="30" y2="80" stroke="white" stroke-width="1.5" stroke-dasharray="4 3" opacity="0.8"/>
          <text id="sideLblS" x="34" y="50" fill="white" font-size="10" font-family="DM Mono,monospace" font-weight="500" opacity="0.9">0.9m</text>
          <!-- deep depth arrow -->
          <line id="sideArrowD" x1="230" y1="10" x2="230" y2="120" stroke="white" stroke-width="1.5" stroke-dasharray="4 3" opacity="0.8"/>
          <text id="sideLblD" x="235" y="70" fill="white" font-size="10" font-family="DM Mono,monospace" font-weight="500" opacity="0.9">1.8m</text>
          <!-- length label -->
          <line id="sideDimH" x1="10" y1="132" x2="250" y2="132" stroke="#0096c7" stroke-width="1.5" marker-start="url(#arr)" marker-end="url(#arr2)"/>
          <text id="sideLenLbl" x="130" y="129" text-anchor="middle" fill="#03045e" font-size="10" font-family="DM Mono,monospace" font-weight="500">9 m</text>
          <!-- labels -->
          <text x="10" y="8" fill="#5a7f90" font-size="9" font-family="DM Sans,sans-serif">Shallow</text>
          <text x="210" y="8" fill="#5a7f90" font-size="9" font-family="DM Sans,sans-serif">Deep</text>
        </g>

      </svg>
    </div>
  </div>

  <!-- Mode toggle -->
  <div class="toggle-wrap">
    <button class="toggle-btn active" id="btnFlat" onclick="setMode('flat')">Flat bottom</button>
    <button class="toggle-btn" id="btnSloped" onclick="setMode('sloped')">Shallow + Deep end</button>
  </div>

  <div class="controls">
    <!-- Width + Length (always shown) -->
    <div class="row">
      <div class="field">
        <label for="inpWidth">Width (m)</label>
        <input id="inpWidth" type="text" inputmode="decimal" value="5" placeholder="e.g. 6,5" oninput="updateAll()">
      </div>
      <div class="field">
        <label for="inpLength">Length (m)</label>
        <input id="inpLength" type="text" inputmode="decimal" value="9" placeholder="e.g. 8,85" oninput="updateAll()">
      </div>
    </div>
    <p class="hint">Use a comma or full stop for decimals — e.g. 6,5 or 6.5</p>

    <!-- Flat depth -->
    <div id="depthFlat">
      <div class="field full">
        <label for="depth">Depth (m)</label>
        <input id="depth" type="text" inputmode="decimal" placeholder="e.g. 1,5" oninput="updateAll()">
      </div>
    </div>

    <!-- Sloped depths -->
    <div id="depthSloped" style="display:none">
      <div class="row">
        <div class="field">
          <label for="depthShallow">Shallow end (m)</label>
          <input id="depthShallow" type="text" inputmode="decimal" placeholder="e.g. 0,9" oninput="updateAll()">
        </div>
        <div class="field">
          <label for="depthDeep">Deep end (m)</label>
          <input id="depthDeep" type="text" inputmode="decimal" placeholder="e.g. 1,8" oninput="updateAll()">
        </div>
      </div>
    </div>
  </div>

  <!-- Result -->
  <div class="result-wrap">
    <div class="result-main">
      <div class="result-num" id="litres">0</div>
      <div class="result-unit">Litres</div>
    </div>
    <div class="result-sub">
      <span>Volume</span>
      <span id="cubic">— m³</span>
    </div>
  </div>

</div>

<script>
  let mode = 'flat';

  function parseVal(str) {
    return parseFloat(String(str).replace(',', '.'));
  }

  function setMode(m) {
    mode = m;
    document.getElementById('btnFlat').classList.toggle('active', m === 'flat');
    document.getElementById('btnSloped').classList.toggle('active', m === 'sloped');
    document.getElementById('depthFlat').style.display   = m === 'flat'   ? 'flex' : 'none';
    document.getElementById('depthSloped').style.display = m === 'sloped' ? 'flex' : 'none';
    document.getElementById('svgTopDown').style.display  = m === 'flat'   ? ''     : 'none';
    document.getElementById('svgSide').style.display     = m === 'sloped' ? ''     : 'none';
    document.getElementById('viewLabel').textContent = m === 'flat' ? 'Top-down view' : 'Side view (cross-section)';
    updateAll();
  }

  function updateTopDown(w, l) {
    const maxW = 230, maxH = 110;
    const scale = Math.min(maxW / Math.max(w, l), maxH / Math.max(w, l));
    const svgW = Math.round(l * scale);
    const svgH = Math.round(w * scale);
    const padX = Math.round((260 - svgW) / 2);
    const padY = Math.round((128 - svgH) / 2);

    const set = (id, attrs) => { const el = document.getElementById(id); Object.entries(attrs).forEach(([k,v]) => el.setAttribute(k,v)); };

    set('tdOuter', {x: padX-8, y: padY-8, width: svgW+16, height: svgH+16});
    ['tdInner','tdWater'].forEach(id => set(id, {x: padX, y: padY, width: svgW, height: svgH}));

    const t1 = padY + svgH/3, t2 = padY + 2*svgH/3;
    set('tdLane1', {x1:padX, x2:padX+svgW, y1:t1, y2:t1});
    set('tdLane2', {x1:padX, x2:padX+svgW, y1:t2, y2:t2});

    const lineY = padY + svgH + 10;
    set('tdDimH', {x1:padX, x2:padX+svgW, y1:lineY, y2:lineY});
    set('tdWLbl', {x: padX+svgW/2, y: lineY-3});
    document.getElementById('tdWLbl').textContent = l + ' m';

    const lineX = padX + svgW + 10;
    set('tdDimV', {x1:lineX, x2:lineX, y1:padY, y2:padY+svgH});
    set('tdHLbl', {x: lineX+4, y: padY+svgH/2+15});
    document.getElementById('tdHLbl').textContent = w + ' m';
  }

  function updateSideView(l, shallow, deep) {
    // SVG canvas: surface = y:10, canvas bottom = y:120, canvasH = 110px
    // In SVG y increases DOWNWARD, so deeper = higher y number
    const canvasH = 110;
    const maxD = Math.max(shallow || 1, deep || 2, 0.1);
    const scale = canvasH / maxD;

    // Shallow floor is closer to surface (smaller y offset), deep floor further down (larger y offset)
    const floorShallowY = 10 + Math.min(shallow > 0 ? shallow * scale : canvasH * 0.4, canvasH);
    const floorDeepY    = 10 + Math.min(deep    > 0 ? deep    * scale : canvasH * 0.9, canvasH);

    const shell = document.getElementById('sideShell');
    const water = document.getElementById('sideWater');
    const floor = document.getElementById('sideFloor');

    // Pool shell: top-left, top-right, floor-right (deep), floor-left (shallow)
    const pts = `10,10 250,10 250,${floorDeepY} 10,${floorShallowY}`;
    shell.setAttribute('points', pts);
    water.setAttribute('points', pts);
    floor.setAttribute('x1', 10); floor.setAttribute('y1', floorShallowY);
    floor.setAttribute('x2', 250); floor.setAttribute('y2', floorDeepY);

    // Shallow depth arrow: from surface (y=10) to floor at shallow end
    const sAS = document.getElementById('sideArrowS');
    sAS.setAttribute('y1', 10); sAS.setAttribute('y2', floorShallowY);
    const sLS = document.getElementById('sideLblS');
    sLS.setAttribute('y', (10 + floorShallowY) / 2 + 4);
    sLS.textContent = (shallow > 0 ? shallow : '?') + 'm';

    // Deep depth arrow
    const sAD = document.getElementById('sideArrowD');
    sAD.setAttribute('y1', 10); sAD.setAttribute('y2', floorDeepY);
    const sLD = document.getElementById('sideLblD');
    sLD.setAttribute('y', (10 + floorDeepY) / 2 + 4);
    sLD.textContent = (deep > 0 ? deep : '?') + 'm';

    // Length label
    document.getElementById('sideLenLbl').textContent = (l > 0 ? l : '?') + ' m';
  }

  function updateAll() {
    const w = parseVal(document.getElementById('inpWidth').value);
    const l = parseVal(document.getElementById('inpLength').value);
    const litresEl = document.getElementById('litres');
    const cubicEl  = document.getElementById('cubic');

    document.getElementById('dimLabel').textContent =
      (!isNaN(w) && !isNaN(l)) ? w + 'm × ' + l + 'm' : '— × —';

    if (mode === 'flat') {
      if (!isNaN(w) && w > 0 && !isNaN(l) && l > 0) updateTopDown(w, l);

      const depth = parseVal(document.getElementById('depth').value);
      if (isNaN(w)||isNaN(l)||isNaN(depth)||w<=0||l<=0||depth<=0) {
        litresEl.textContent = '0'; cubicEl.textContent = '— m³'; return;
      }
      const m3 = w * l * depth;
      litresEl.textContent = (m3*1000).toLocaleString(undefined,{maximumFractionDigits:0});
      cubicEl.textContent  = m3.toLocaleString(undefined,{maximumFractionDigits:2}) + ' m³';

    } else {
      const shallow = parseVal(document.getElementById('depthShallow').value);
      const deep    = parseVal(document.getElementById('depthDeep').value);
      updateSideView(l > 0 ? l : 9, shallow > 0 ? shallow : 0, deep > 0 ? deep : 0);

      if (isNaN(w)||isNaN(l)||isNaN(shallow)||isNaN(deep)||w<=0||l<=0||shallow<=0||deep<=0) {
        litresEl.textContent = '0'; cubicEl.textContent = '— m³'; return;
      }
      // Volume of a prism: L × W × average depth
      const avgDepth = (shallow + deep) / 2;
      const m3 = w * l * avgDepth;
      litresEl.textContent = (m3*1000).toLocaleString(undefined,{maximumFractionDigits:0});
      cubicEl.textContent  = m3.toLocaleString(undefined,{maximumFractionDigits:2}) + ' m³';
    }
  }

  updateAll();
</script>
</body>
</html>
