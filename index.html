<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#03045e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Pool Fill">
<title>Pool Fill Calculator</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=DM+Mono:wght@500&display=swap');

  :root {
    --navy:  #03045e;
    --blue:  #0096c7;
    --aqua:  #48cae4;
    --tile:  #e0f4fb;
    --sand:  #fdf6ec;
    --muted: #5a7f90;
    --white: #ffffff;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', -apple-system, sans-serif;
    min-height: 100vh;
    background: var(--sand);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px 16px 40px;
  }

  .header { text-align: center; margin-bottom: 20px; }
  .header h1 {
    font-size: 13px; font-weight: 700;
    letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted);
  }
  .header p {
    font-size: 28px; font-weight: 700; color: var(--navy);
    margin-top: 2px; letter-spacing: -0.5px;
  }

  .card {
    background: var(--white);
    border-radius: 24px;
    width: 100%; max-width: 380px;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(3,4,94,.13), 0 4px 12px rgba(3,4,94,.07);
  }

  .pool-wrap { background: var(--tile); padding: 24px 28px 18px; }
  .pool-label {
    font-size: 11px; font-weight: 700; letter-spacing: 0.1em;
    text-transform: uppercase; color: var(--muted);
    margin-bottom: 12px;
    display: flex; justify-content: space-between; align-items: center;
  }
  .pool-label span { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--blue); }
  .pool-svg-wrap { display: flex; justify-content: center; }
  #poolSvg { display: block; overflow: visible; }

  .controls { padding: 20px 24px 24px; display: flex; flex-direction: column; gap: 14px; }
  .row { display: flex; gap: 12px; }
  .field { flex: 1; display: flex; flex-direction: column; gap: 5px; }
  .field.full { flex: unset; width: 100%; }

  label {
    font-size: 11px; font-weight: 700;
    letter-spacing: 0.09em; text-transform: uppercase; color: var(--muted);
  }

  input {
    font-family: 'DM Sans', sans-serif;
    font-size: 18px; font-weight: 500;
    color: var(--navy);
    background: var(--sand);
    border: 2px solid transparent;
    border-radius: 12px;
    padding: 11px 14px;
    width: 100%; outline: none;
    -webkit-appearance: none; appearance: none;
  }
  input:focus { border-color: var(--aqua); background-color: #f0fafd; }
  input::placeholder { color: #b0c8d4; }

  .hint { font-size: 11px; color: var(--muted); margin-top: 2px; }

  .result-wrap {
    background: linear-gradient(135deg, var(--navy) 0%, #0077b6 100%);
    margin: 0 24px 24px;
    border-radius: 16px; padding: 18px 20px;
    display: flex; align-items: center; justify-content: space-between; gap: 10px;
  }
  .result-main { display: flex; flex-direction: column; }
  .result-num {
    font-family: 'DM Mono', monospace;
    font-size: 34px; font-weight: 500; color: var(--white);
    line-height: 1; letter-spacing: -1px;
  }
  .result-unit {
    font-size: 12px; font-weight: 700; letter-spacing: 0.1em;
    text-transform: uppercase; color: var(--aqua); margin-top: 4px;
  }
  .result-sub {
    font-family: 'DM Mono', monospace;
    font-size: 15px; color: rgba(255,255,255,0.5);
    text-align: right; white-space: nowrap;
  }
  .result-sub span {
    display: block; font-size: 11px; text-transform: uppercase;
    letter-spacing: 0.08em; color: rgba(255,255,255,0.35); margin-bottom: 2px;
  }
</style>
</head>
<body>

<div class="header">
  <h1>McNab Pool Calculator<br> © Stuart McNab Minton 2026. All rights reserved.</h1>
  <p>How much water do you need? <br> ¿Cuánta agua necesitas?</p>
</div>

<div class="card">

  <div class="pool-wrap">
    <div class="pool-label">
      Top-down view <span id="dimLabel">5m × 9m</span>
    </div>
    <div class="pool-svg-wrap">
      <svg id="poolSvg" width="260" height="140" viewBox="0 0 260 140">
        <defs>
          <linearGradient id="waterGrad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#48cae4"/>
            <stop offset="100%" stop-color="#0096c7"/>
          </linearGradient>
          <linearGradient id="tileGrad" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#caf0f8"/>
            <stop offset="100%" stop-color="#ade8f4"/>
          </linearGradient>
          <pattern id="tiles" x="0" y="0" width="14" height="14" patternUnits="userSpaceOnUse">
            <rect width="14" height="14" fill="url(#tileGrad)"/>
            <rect width="13" height="13" fill="none" stroke="white" stroke-width="0.8" opacity="0.6"/>
          </pattern>
          <marker id="arr" markerWidth="6" markerHeight="6" refX="3" refY="3" orient="auto">
            <path d="M6,3 L0,0 L0,6 Z" fill="#0096c7"/>
          </marker>
          <marker id="arr2" markerWidth="6" markerHeight="6" refX="3" refY="3" orient="auto-start-reverse">
            <path d="M0,3 L6,0 L6,6 Z" fill="#0096c7"/>
          </marker>
        </defs>
        <rect id="poolOuter" x="0" y="0" width="260" height="140" rx="10" fill="#b8dce8"/>
        <rect id="poolInner" x="10" y="10" width="240" height="120" rx="6" fill="url(#tiles)"/>
        <rect id="poolWater" x="10" y="10" width="240" height="120" rx="6" fill="url(#waterGrad)" opacity="0.82"/>
        <line id="lane1" x1="10" y1="50" x2="250" y2="50" stroke="white" stroke-width="1.2" stroke-dasharray="8 5" opacity="0.45"/>
        <line id="lane2" x1="10" y1="90" x2="250" y2="90" stroke="white" stroke-width="1.2" stroke-dasharray="8 5" opacity="0.45"/>
        <line id="dimLineH" x1="10" y1="134" x2="250" y2="134" stroke="#0096c7" stroke-width="1.5" marker-start="url(#arr)" marker-end="url(#arr2)"/>
        <text id="wLabel" x="130" y="131" text-anchor="middle" fill="#03045e" font-size="10" font-family="DM Mono,monospace" font-weight="500">9 m</text>
        <line id="dimLineV" x1="255" y1="10" x2="255" y2="130" stroke="#0096c7" stroke-width="1.5" marker-start="url(#arr)" marker-end="url(#arr2)"/>
        <text id="hLabel" x="259" y="74" fill="#03045e" font-size="10" font-family="DM Mono,monospace" font-weight="500" writing-mode="tb">5 m</text>
      </svg>
    </div>
  </div>

  <div class="controls">
    <div class="row">
      <div class="field">
        <label for="inpWidth">Width (m)</label>
        <input id="inpWidth" type="text" inputmode="decimal" value="5" placeholder="e.g. 6,5" oninput="updateAll()">
      </div>
      <div class="field">
        <label for="inpLength">Length (m)</label>
        <input id="inpLength" type="text" inputmode="decimal" value="9" placeholder="e.g. 8,85" oninput="updateAll()">
      </div>
    </div>
    <p class="hint">Use a comma or full stop for decimals — e.g. 6,5 or 6.5</p>

    <div class="field full">
      <label for="depth">Depth (m)</label>
      <input id="depth" type="text" inputmode="decimal" placeholder="e.g. 1,5" oninput="updateAll()">
    </div>
  </div>

  <div class="result-wrap">
    <div class="result-main">
      <div class="result-num" id="litres">0</div>
      <div class="result-unit">Litres</div>
    </div>
    <div class="result-sub">
      <span>Volume</span>
      <span id="cubic">— m³</span>
    </div>
  </div>

</div>

<script>
  function parseVal(str) {
    return parseFloat(String(str).replace(',', '.'));
  }

  function updateSvg(w, l) {
    const maxW = 230, maxH = 110;
    const scale = Math.min(maxW / Math.max(w, l), maxH / Math.max(w, l));
    const svgW = Math.round(l * scale);
    const svgH = Math.round(w * scale);
    const padX = Math.round((260 - svgW) / 2);
    const padY = Math.round((140 - svgH) / 2);

    const outer = document.getElementById('poolOuter');
    const inner = document.getElementById('poolInner');
    const water = document.getElementById('poolWater');
    const lane1 = document.getElementById('lane1');
    const lane2 = document.getElementById('lane2');
    const dimH  = document.getElementById('dimLineH');
    const dimV  = document.getElementById('dimLineV');
    const wLbl  = document.getElementById('wLabel');
    const hLbl  = document.getElementById('hLabel');
    const dimLbl= document.getElementById('dimLabel');

    outer.setAttribute('x', padX - 8);  outer.setAttribute('y', padY - 8);
    outer.setAttribute('width', svgW + 16); outer.setAttribute('height', svgH + 16);

    [inner, water].forEach(el => {
      el.setAttribute('x', padX); el.setAttribute('y', padY);
      el.setAttribute('width', svgW); el.setAttribute('height', svgH);
    });

    const t1 = padY + svgH / 3, t2 = padY + 2 * svgH / 3;
    lane1.setAttribute('x1', padX); lane1.setAttribute('x2', padX + svgW);
    lane1.setAttribute('y1', t1);   lane1.setAttribute('y2', t1);
    lane2.setAttribute('x1', padX); lane2.setAttribute('x2', padX + svgW);
    lane2.setAttribute('y1', t2);   lane2.setAttribute('y2', t2);

    const lineY = padY + svgH + 10;
    dimH.setAttribute('x1', padX); dimH.setAttribute('x2', padX + svgW);
    dimH.setAttribute('y1', lineY); dimH.setAttribute('y2', lineY);
    wLbl.setAttribute('x', padX + svgW / 2);
    wLbl.setAttribute('y', lineY - 3);
    wLbl.textContent = l + ' m';

    const lineX = padX + svgW + 10;
    dimV.setAttribute('x1', lineX); dimV.setAttribute('x2', lineX);
    dimV.setAttribute('y1', padY);  dimV.setAttribute('y2', padY + svgH);
    hLbl.setAttribute('x', lineX + 4);
    hLbl.setAttribute('y', padY + svgH / 2 + 15);
    hLbl.textContent = w + ' m';

    dimLbl.textContent = w + 'm × ' + l + 'm';
  }

  function updateAll() {
    const w = parseVal(document.getElementById('inpWidth').value);
    const l = parseVal(document.getElementById('inpLength').value);
    const depth = parseVal(document.getElementById('depth').value);
    const litresEl = document.getElementById('litres');
    const cubicEl  = document.getElementById('cubic');

    if (!isNaN(w) && w > 0 && !isNaN(l) && l > 0) {
      updateSvg(w, l);
    }

    if (isNaN(w) || isNaN(l) || isNaN(depth) || w <= 0 || l <= 0 || depth <= 0) {
      litresEl.textContent = '0';
      cubicEl.textContent  = '— m³';
      return;
    }

    const m3 = w * l * depth;
    litresEl.textContent = (m3 * 1000).toLocaleString(undefined, {maximumFractionDigits: 0});
    cubicEl.textContent  = m3.toLocaleString(undefined, {maximumFractionDigits: 2}) + ' m³';
  }

  updateAll();
</script>
</body>
</html>
